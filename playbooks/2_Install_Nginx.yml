---
- name: Install Nginx
  hosts: webservers
  become: yes

  tasks:
    - name: Update package cache
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start and enable Nginx service
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Verify Nginx is running
      command: systemctl status nginx
      register: nginx_status

    - name: Print Nginx status
      debug:
        var: nginx_status.stdout
