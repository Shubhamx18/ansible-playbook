---
- name: Host Static Website using Nginx
  hosts: webservers
  become: yes

  tasks:

    - name: Update package cache
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Copy index.html to server
      copy:
        src: /home/ubuntu/ansible.html
        dest: /var/www/html/index.html
        mode: '0644'
